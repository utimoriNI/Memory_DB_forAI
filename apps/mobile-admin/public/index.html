<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#14342f" />
    <meta
      name="description"
      content="AI Memory Vault の承認とInbox取り込みを行うモバイル管理画面"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Memory Vault Admin</title>
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">AI MEMORY VAULT</p>
          <h1>承認キュー</h1>
        </div>
        <button id="refresh-button" class="icon-button" type="button" aria-label="更新">↻</button>
      </header>

      <section id="status" class="status" aria-live="polite">接続情報を入力してください。</section>

      <section class="summary-grid" aria-label="Vaultの概要">
        <article class="summary-card">
          <span>承認待ち</span>
          <strong id="pending-count">—</strong>
        </article>
        <article class="summary-card head-card">
          <span>現在の版</span>
          <strong id="head-sha">—</strong>
        </article>
      </section>

      <section class="panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">REVIEW</p>
            <h2>記憶候補</h2>
          </div>
        </div>
        <div id="proposal-list" class="proposal-list"></div>
      </section>

      <section class="panel inbox-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">CAPTURE</p>
            <h2>Inboxへメモを追加</h2>
          </div>
        </div>
        <form id="inbox-form">
          <label>タイトル<input id="inbox-title" name="title" required maxlength="200" /></label>
          <label
            >内容<textarea
              id="inbox-content"
              name="content"
              required
              maxlength="20000"
              rows="5"
            ></textarea>
          </label>
          <label
            >出典<input
              id="inbox-source"
              name="source"
              value="mobile-admin"
              required
              maxlength="300"
          /></label>
          <button class="primary" type="submit">Inboxに保存</button>
        </form>
      </section>
    </main>

    <dialog id="login-dialog" class="dialog login-dialog">
      <form id="login-form" method="dialog">
        <p class="eyebrow">PRIVATE ADMIN</p>
        <h2>管理アクセス</h2>
        <p>
          この端末のブラウザにはGitHubの権限を保存しません。管理アクセストークンはこのタブを閉じると消えます。
        </p>
        <label
          >管理アクセストークン<input
            id="access-token"
            type="password"
            autocomplete="current-password"
            required
        /></label>
        <button class="primary" type="submit">Vaultを開く</button>
      </form>
    </dialog>

    <dialog id="proposal-dialog" class="dialog proposal-dialog">
      <article>
        <div class="dialog-header">
          <div>
            <p id="proposal-type" class="eyebrow"></p>
            <h2 id="proposal-title"></h2>
          </div>
          <button id="close-proposal" class="icon-button" type="button" aria-label="閉じる">
            ×
          </button>
        </div>
        <section class="human-summary" aria-labelledby="human-summary-title">
          <p class="eyebrow">FOR REVIEW</p>
          <h3 id="human-summary-title">この候補について</h3>
          <p id="proposal-human-summary"></p>
          <ul id="proposal-highlights" class="highlights"></ul>
        </section>
        <dl id="proposal-meta" class="meta-list"></dl>
        <label id="risk-acknowledgement" class="risk-ack hidden">
          <input id="risk-checkbox" type="checkbox" />
          高リスクの変更であることを確認しました
        </label>
        <h3>変更差分</h3>
        <pre id="proposal-diff" class="diff"></pre>
        <div class="action-row">
          <button id="reject-button" class="danger" type="button">却下</button>
          <button id="approve-button" class="primary" type="button">承認して反映</button>
        </div>
      </article>
    </dialog>
    <script type="module" src="/app.js"></script>
  </body>
</html>
