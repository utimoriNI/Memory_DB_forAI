name: Import Journal reflections

on:
  schedule:
    # 07:00 JST (GitHub schedules use UTC and may be delayed during high load).
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional reflection date in YYYY-MM-DD format"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: import-journal
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MemoryDB
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Checkout Journal source
        uses: actions/checkout@v4
        with:
          repository: utimoriNI/Journal
          ref: main
          path: journal-source
          # Set JOURNAL_READ_TOKEN only when the Journal repository is private.
          token: ${{ secrets.JOURNAL_READ_TOKEN || github.token }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Import previous JST reflection
        if: ${{ inputs.date == '' }}
        run: npm run journal:import
        env:
          JOURNAL_REPO_PATH: ${{ github.workspace }}/journal-source
          MEMORY_VAULT_PATH: ${{ github.workspace }}/memory

      - name: Import requested reflection
        if: ${{ inputs.date != '' }}
        run: npm run journal:import -- --date "${{ inputs.date }}"
        env:
          JOURNAL_REPO_PATH: ${{ github.workspace }}/journal-source
          MEMORY_VAULT_PATH: ${{ github.workspace }}/memory

      - name: Validate generated changes
        run: |
          npm run lint
          npm run typecheck
          npm test

      - name: Commit imported Inbox source
        run: |
          git add memory/_inbox memory/_state/index.json memory/MEMORY.md
          if git diff --cached --quiet; then
            echo "No new Journal reflection to import."
            exit 0
          fi
          git config user.name "ai-memory-journal-bot"
          git config user.email "ai-memory-journal-bot@users.noreply.github.com"
          git commit -m "memory: import Journal reflection"
          git push
